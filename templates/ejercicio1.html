<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ejercicio 1</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="contenedor">
        <h1>Ejercicio 1 - Pintureria</h1>

        <form method="POST" action="{{ url_for('ejercicio1') }}">
            <label for="nombre">Nombre:</label>
            <input type="text" name="nombre" id="nombre" required>

            <label for="edad">Edad:</label>
            <input type="number" name="edad" id="edad" min="1" required>

            <label for="cantidad">Cantidad de tarros de pintura:</label>
            <input type="number" name="cantidad" id="cantidad" min="1" required>

            <button type="submit" class="boton">Enviar</button>
        </form>

        {% if resultado %}
        <div class="resultado">
            <h2>Resultado</h2>
            <p><strong>Cliente:</strong> {{ resultado.nombre }}</p>
            <p><strong>Total sin descuento:</strong> ${{ resultado.total_sin_descuento }}</p>
            <p><strong>Descuento aplicado:</strong> {{ resultado.descuento }}%</p>
            <p><strong>Total a pagar:</strong> ${{ resultado.total_a_pagar }}</p>
        </div>
        {% endif %}

        <a href="{{ url_for('inicio') }}" class="enlace-volver">Volver al inicio</a>
    </div>
</body>
</html>
